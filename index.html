<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thunderstorms Data Viewer</title><link rel="stylesheet" href="styles.css"></head><body><div class="app-shell"><header class="top-bar"><div class="title-block"><h1>Thunderstorms Data Viewer</h1><p id="datasetTitle">Loading...</p></div><img class="bom-logo" src="assets/branding/bom_logo.png" alt="The Bureau of Meteorology logo"></header><main class="viewer-layout"><section class="image-stage"><div class="image-wrap"><img id="loopImage" alt="Selected weather data frame" draggable="false"></div></section><aside class="dataset-panel"><div id="datasetSections"></div></aside></main><footer class="time-controls"><div class="transport-controls"><button id="firstBtn">First</button><button id="prevBtn">Prev</button><button id="playPauseBtn" class="primary">Play</button><button id="nextBtn">Next</button><button id="lastBtn">Last</button></div><div id="timeButtonBar" class="time-button-bar"></div><div class="speed-control"><label for="speedSelect">Loop Speed</label><select id="speedSelect"><option value="0.5">0.5x</option><option value="1" selected>1x</option><option value="1.5">1.5x</option><option value="2">2x</option><option value="3">3x</option></select></div><div class="shortcut-note"><strong>Shortcuts</strong><br>Space: Play/Pause<br>Left/Right: Step frames<br>Home/End: First/Last<br>Up/Down: Change data type</div></footer></div><script src="app.js"></script></body></html>
